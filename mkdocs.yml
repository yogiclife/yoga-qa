site_name: Yoga Q/A Repository
site_description: Searchable collection of authentic Yogic Life teachings
site_url: https://yogiclife.github.io/yoga-qa/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Philosophy: philosophy/
  - Mind: mind/
  - Mind & Body: mind-body/
  - Food: food/
  - Sadhana: sadhana/
  - Yogic Life: yogic-life/
  - Ethics: ethics/
  - Creation Cycle: creation-cycle/
  - Misc: misc/

plugins:
  - search
