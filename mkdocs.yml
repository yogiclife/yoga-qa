site_name: Yoga Q/A Repository
site_description: A searchable collection of authentic answers on Yogic Life and Rajádhirája Yoga
site_url: https://yogiclife.github.io/yoga-qa/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Philosophy: philosophy/
  - Mind: mind/
  - Mind & Body: mind-body/
  - Food: food/
  - Sadhana: sadhana/
  - Yogic Life: yogic-life/
  - Ethics: ethics/
  - Creation Cycle: creation-cycle/
  - Misc: misc/

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
